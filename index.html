<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Welcome to My Cloud Website</h1>
        <p>Hosted using GitHub Pages</p>
    </header>

    <section class="content">
        <h2>About</h2>
        <p>This is a simple static website created using HTML and CSS.</p>

        <h2>Features</h2>
        <ul>
            <li>Responsive Design</li>
            <li>Fast Loading</li>
            <li>Free Hosting</li>
        </ul>

        <button onclick="showMessage()">Click Me</button>
        <p id="msg"></p>
    </section>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

    <script>
        function showMessage() {
            document.getElementById("msg").innerHTML =
            "Website is successfully hosted on the cloud!";
        }
    </script>

</body>
</html>
